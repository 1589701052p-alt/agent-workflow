# RFC-054 W2-5 — visual regression nightly + path-filtered PR gate.
#
# Compares ubuntu-rendered snapshots of 8 key pages against the
# committed `*-chromium-linux.png` baselines under
# `e2e/visual-regression.spec.ts-snapshots/`. Threshold is 0.2%
# per RFC-054 plan §risk 9.
#
# Trigger:
#   * `schedule` — 09:00 UTC daily (15 min after git-protocols nightly).
#   * `workflow_dispatch` — manual button for refreshing ubuntu
#     baselines (see e2e/visual-regression.README.md option B).
#   * `pull_request` — only when the diff touches the frontend or
#     this spec / workflow itself.
#
# CI ubuntu baselines must be committed before the gate is operational.
# The first run after this workflow lands will FAIL because the
# `*-chromium-linux.png` files don't exist yet. A separate one-time
# "chore(visual): seed ubuntu baselines" PR populates them — see
# `e2e/visual-regression.README.md` for the procedure.

name: visual-regression-nightly

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/frontend/**'
      - 'e2e/visual-regression.spec.ts'
      - 'e2e/visual-regression.spec.ts-snapshots/**'
      - 'e2e/visual-regression.README.md'
      - '.github/workflows/visual-regression-nightly.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Playwright visual regression (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.x'

      - name: Install opencode (daemon dependency)
        run: |
          bun install -g opencode-ai
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build daemon binary
        run: bun run build:binary

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression spec
        env:
          CI: 'true'
          RUN_VISUAL_REGRESSION: '1'
        run: bun run e2e e2e/visual-regression.spec.ts

      - name: Upload diff artifacts on failure
        # Contains the actual rendered PNGs that diverged — used to
        # populate fresh ubuntu baselines via the option-B procedure
        # in e2e/visual-regression.README.md.
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: visual-regression-failure
          path: |
            test-results/
            playwright-report/
            e2e/visual-regression.spec.ts-snapshots/
          if-no-files-found: ignore
