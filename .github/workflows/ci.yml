name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck + Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Lockfile format was changed in 1.2+; keep CI on the same major as
          # what developers run locally. Bump as the project upgrades.
          bun-version: '1.3.x'

      - name: Install opencode (required by daemon/doctor tests)
        # Daemon `start` refuses to run without opencode >= MIN_OPENCODE_VERSION
        # (1.14.0); cli `doctor` asserts opencode is in PATH. Several test
        # files spawn the daemon end-to-end so the binary must be installed.
        run: |
          bun install -g opencode-ai
          # setup-bun already puts ~/.bun/bin on PATH for subsequent steps,
          # but be explicit so the smoke check below works in this step too.
          export PATH="$HOME/.bun/bin:$PATH"
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (backend + shared, bun:test)
        run: bun test

      - name: Test (frontend, vitest)
        run: bun run --filter @agent-workflow/frontend test
